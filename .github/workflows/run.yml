name: Ejecutar scraper MEFF

permissions:
  contents: write

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 09:00 España
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Dependencias
      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4 pandas

      # 4. Ejecutar script
      - name: Ejecutar script
        env:
          EMAIL_ORIGEN: ${{ secrets.EMAIL_ORIGEN }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          PASSWORD_APP: ${{ secrets.PASSWORD_APP }}
        run: python meff_opciones.py

      # 5. Commit CSV (IMPORTANTE: permisos)
      - name: Commit y push CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git add data/*.csv || true
          
          git diff --cached --quiet || git commit -m "CSV actualizado $(date +'%Y-%m-%d')"
          
          git push
