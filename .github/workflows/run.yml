name: Ejecutar scraper MEFF

permissions:
  contents: write

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Ejecutar script
        env:
          EMAIL_ORIGEN: ${{ secrets.EMAIL_ORIGEN }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          PASSWORD_APP: ${{ secrets.PASSWORD_APP }}
        run: python meff_opciones.py

      - name: Commit y push CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.csv || true
          git diff --cached --quiet || git commit -m "CSV actualizado $(date +'%Y-%m-%d')"
          git push
